@if (auth.isAuthenticated) {
  <div class="shell" [class.is-open]="drawerOpen" [class.is-mobile]="isMobile">
    @if (drawerOpen && isMobile) {
      <div class="drawer-backdrop" (click)="closeDrawer()" aria-hidden="true"></div>
    }

    <header class="topstrip">
      <div class="topstrip__brand-cell">
        <button
          type="button"
          class="topstrip__toggle"
          (click)="toggleDrawer()"
          [attr.aria-expanded]="drawerOpen"
          aria-controls="app-drawer"
          [attr.aria-label]="drawerOpen ? 'Close navigation' : 'Open navigation'"
        >
          <i class="bi" [class.bi-x-lg]="drawerOpen" [class.bi-list]="!drawerOpen"></i>
        </button>
        <div class="topstrip__brand" aria-hidden="true">
          Form<span>/</span><em>Lib</em>
        </div>
      </div>
      <span class="topstrip__spacer"></span>
      <button
        type="button"
        class="topstrip__btn"
        (click)="toggleTheme()"
        [attr.aria-label]="'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme'"
        title="Toggle theme"
      >
        <i class="bi" [class.bi-sun]="theme === 'dark'" [class.bi-moon]="theme === 'light'"></i>
      </button>
    </header>

    <aside id="app-drawer" class="sidebar" [class.is-open]="drawerOpen" aria-label="Main navigation">
      <nav class="sidebar__nav" aria-label="Main">
        <div class="sidebar__section">Records</div>
        @if (auth.can('employee', 'read')) {
          <a routerLink="/employees" routerLinkActive="active" class="sidebar__link" (click)="isMobile && closeDrawer()">
            <span class="sidebar__link-name">Employees</span>
          </a>
        }
        @if (auth.can('department', 'read')) {
          <a routerLink="/departments" routerLinkActive="active" class="sidebar__link" (click)="isMobile && closeDrawer()">
            <span class="sidebar__link-name">Departments</span>
          </a>
        }

        <div class="sidebar__section">Dev</div>
        <a routerLink="/playground" routerLinkActive="active" class="sidebar__link" (click)="isMobile && closeDrawer()">
          <span class="sidebar__link-name">Playground</span>
        </a>
      </nav>

      <div class="sidebar__foot">
        <div class="sidebar__user">
          <div class="sidebar__user-label">Operator</div>
          <div class="sidebar__user-name">{{ auth.currentUser?.displayName }}</div>
        </div>

        <div class="sidebar__toolbar">
          <button
            type="button"
            class="sidebar__tool"
            [class.is-on]="debugService.enabled"
            (click)="debugService.toggle()"
            [attr.aria-pressed]="debugService.enabled"
            title="Toggle debug"
          >
            <i class="bi bi-bug"></i>
          </button>
          <button
            type="button"
            class="sidebar__tool sidebar__tool--danger"
            (click)="onLogout()"
            title="Log out"
          >
            <i class="bi bi-box-arrow-left"></i>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      @if (navigating) {
        <div class="route-loading-bar"></div>
      }
      <router-outlet />
    </main>
  </div>
  <dialog-host />
  <toast-container />
} @else {
  <router-outlet />
}
